services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: budgetmate-backend
    network_mode: host
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URLS: ${FRONTEND_URLS:-}
      ALLOW_VERCEL_ORIGIN: ${ALLOW_VERCEL_ORIGIN:-false}
    volumes:
      - budgetmate_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: budgetmate-frontend
    network_mode: host
    restart: unless-stopped

volumes:
  budgetmate_data: